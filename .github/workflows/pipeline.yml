name: Deployment

on:
  push:
    branches:
      - main

jobs:
  hello_world:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: 
          node-version: '22'
      - name: install dependencies
        run: npm install
      - name: lint
        run: npm run lint